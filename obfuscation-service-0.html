<!doctype html>
<html lang="en" data-page-id="4781">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obfuscation Service 0</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .obs-list {
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .obs-item {
        color: var(--fg-dim);
        text-shadow: 0 0 10px var(--glow);
        font-size: 14px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <main class="crt" aria-label="Obfuscation Service 0">
      <div class="chrome">
        <div class="status">
          <span class="lamp" aria-hidden="true"></span>
          <span class="label">GEHENNAOS :: OBFUSCATION SERVICE 0</span>
        </div>

        <section class="screen" aria-label="Obfuscation Service 0 screen">
          <div id="output" class="output" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <div id="scanOutlineGlobal" class="scanOutlineGlobal" aria-hidden="true"></div>

    <script src="./ws-client.js"></script>
    <script src="./access-guard.js"></script>
    <script>
      const outputEl = document.getElementById("output");
      const outlineEl = document.getElementById("scanOutlineGlobal");

      function addLine(text, { dim = false } = {}) {
        const line = document.createElement("div");
        line.className = dim ? "line dim" : "line";
        line.textContent = text;
        outputEl.appendChild(line);
      }

      function placeOutline(state) {
        const enabled = Boolean(state?.enabled);
        outlineEl.classList.toggle("on", enabled);
        if (!enabled) return;

        const w = Math.round(state?.wPx ?? 300);
        const h = Math.round(state?.hPx ?? 200);
        const left = Math.round(((state.x ?? 0.5) * window.innerWidth) - w / 2);
        const top = Math.round(((state.y ?? 0.5) * window.innerHeight) - h / 2);
        outlineEl.style.left = `${left}px`;
        outlineEl.style.top = `${top}px`;
        outlineEl.style.width = `${w}px`;
        outlineEl.style.height = `${h}px`;
      }

      window.GEHENNA_WS?.on("scan:state", ({ state }) => placeOutline(state));

      addLine(
        "An obfuscation service ran and maintained by the Federal Bureau of Obfuscation that blocks the following services and pages from unauthorized consoles:",
      );

      const list = document.createElement("ul");
      list.className = "obs-list";
      outputEl.appendChild(list);

      const CHARSET = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_/=:";
      function randomScramble(len) {
        let s = "";
        for (let i = 0; i < len; i++) s += CHARSET[Math.floor(Math.random() * CHARSET.length)];
        return s;
      }

      const items = [];
      const LEN = 34;
      for (let i = 0; i < 25; i++) {
        const li = document.createElement("li");
        li.className = "obs-item";
        li.textContent = randomScramble(LEN);
        list.appendChild(li);
        items.push(li);
      }

      setInterval(() => {
        for (const li of items) li.textContent = randomScramble(LEN);
      }, 55);
    </script>
  </body>
</html>
