<!doctype html>
<html lang="en" data-page-id="9194">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Vault</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .vault-screen {
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .vault-grid {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        padding: 4px 0 0;
        overflow: visible;
        align-items: stretch;
      }

      .vault-col {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
        min-height: 0;
        gap: 2px;
        overflow: visible;
      }

      .vault-row {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        font-size: clamp(7px, 0.85vw, 10px);
        line-height: 1.15;
        color: var(--fg-dim);
        text-shadow: 0 0 6px var(--glow);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 0 2px;
        transition:
          color 0.12s ease,
          text-shadow 0.12s ease;
      }

      .vault-row.is-scan-reveal {
        position: relative;
        z-index: 3;
        color: #ffe46a;
        text-shadow: 0 0 10px rgba(255, 228, 106, 0.55), 0 0 20px rgba(255, 228, 106, 0.25);
        overflow: visible;
        text-overflow: clip;
      }
    </style>
  </head>
  <body>
    <main class="crt" aria-label="Password Vault">
      <div class="chrome">
        <div class="status">
          <span class="lamp" aria-hidden="true"></span>
          <span class="label">GEHENNAOS :: PASSWORD VAULT</span>
        </div>

        <section class="screen vault-screen" aria-label="Password Vault contents">
          <div id="vaultGrid" class="vault-grid"></div>
        </section>
      </div>
    </main>

    <div id="scanOutlineGlobal" class="scanOutlineGlobal" aria-hidden="true"></div>

    <script src="./ws-client.js"></script>
    <script src="./access-guard.js"></script>
    <script>
      const outlineEl = document.getElementById("scanOutlineGlobal");
      const vaultGridEl = document.getElementById("vaultGrid");

      const LINE_TEMPLATE = "Webpage ID | Password = 0000";
      const REVEAL_TEXTS = [
        "Known FBO Services Password = 2981",
        "FBO Surveillance Hub Password = 3677",
        "FBO Critical Internal Servers Pass = 3475",
        "Obfuscation Service 0 Password = 6793",
      ];
      const CHARSET = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz| =";

      const COLS = 5;
      const ROWS = 40;
      const SPECIAL_COL_COUNT = 4;

      let scanState = { enabled: false, x: 0.5, y: 0.5, wPx: 300, hPx: 200 };

      /** @type {{ el: HTMLElement, revealText: string, tickId: ReturnType<typeof setInterval> | null, revealedByScan: boolean }[]} */
      const secretEntries = [];

      function randomScrambleLine(len) {
        let s = "";
        for (let i = 0; i < len; i++) {
          s += CHARSET[Math.floor(Math.random() * CHARSET.length)];
        }
        return s;
      }

      function scanViewportRect() {
        if (!scanState.enabled) return null;
        const w = Math.round(scanState.wPx ?? 300);
        const h = Math.round(scanState.hPx ?? 200);
        const left = Math.round(((scanState.x ?? 0.5) * window.innerWidth) - w / 2);
        const top = Math.round(((scanState.y ?? 0.5) * window.innerHeight) - h / 2);
        return { left, top, right: left + w, bottom: top + h };
      }

      function rectsIntersect(a, b) {
        return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
      }

      function placeOutline(state) {
        const next = state ?? {};
        scanState = {
          ...scanState,
          enabled: Boolean(next.enabled),
          x: Number.isFinite(next.x) ? next.x : scanState.x,
          y: Number.isFinite(next.y) ? next.y : scanState.y,
          wPx: Number.isFinite(next.wPx) ? next.wPx : scanState.wPx,
          hPx: Number.isFinite(next.hPx) ? next.hPx : scanState.hPx,
        };
        outlineEl.classList.toggle("on", scanState.enabled);
        if (!scanState.enabled) return;

        const w = Math.round(scanState.wPx ?? 300);
        const h = Math.round(scanState.hPx ?? 200);
        const left = Math.round(((scanState.x ?? 0.5) * window.innerWidth) - w / 2);
        const top = Math.round(((scanState.y ?? 0.5) * window.innerHeight) - h / 2);
        outlineEl.style.left = `${left}px`;
        outlineEl.style.top = `${top}px`;
        outlineEl.style.width = `${w}px`;
        outlineEl.style.height = `${h}px`;
      }

      function updateScanOverlap() {
        const scanR = scanViewportRect();

        for (const entry of secretEntries) {
          let overlap = false;
          if (scanR) {
            const br = entry.el.getBoundingClientRect();
            const rowR = { left: br.left, top: br.top, right: br.right, bottom: br.bottom };
            overlap = rectsIntersect(scanR, rowR);
          }

          if (overlap && !entry.revealedByScan) {
            entry.revealedByScan = true;
            if (entry.tickId != null) {
              clearInterval(entry.tickId);
              entry.tickId = null;
            }
            entry.el.textContent = entry.revealText;
            entry.el.classList.add("is-scan-reveal");
          } else if (!overlap && entry.revealedByScan) {
            entry.revealedByScan = false;
            entry.el.classList.remove("is-scan-reveal");
            entry.el.textContent = randomScrambleLine(LINE_TEMPLATE.length);
            if (entry.tickId == null) {
              entry.tickId = setInterval(() => {
                if (entry.revealedByScan) return;
                entry.el.textContent = randomScrambleLine(LINE_TEMPLATE.length);
              }, 55);
            }
          }
        }
      }

      function pickSpecialRowByColumn() {
        const colIndices = [0, 1, 2, 3, 4];
        for (let i = colIndices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [colIndices[i], colIndices[j]] = [colIndices[j], colIndices[i]];
        }
        const chosenCols = colIndices.slice(0, SPECIAL_COL_COUNT);
        /** @type {Map<number, number>} */
        const secretRowByCol = new Map();
        for (const c of chosenCols) {
          secretRowByCol.set(c, Math.floor(Math.random() * ROWS));
        }
        return secretRowByCol;
      }

      function buildVault() {
        vaultGridEl.innerHTML = "";
        secretEntries.length = 0;

        const secretRowByCol = pickSpecialRowByColumn();
        const revealTexts = [...REVEAL_TEXTS];
        for (let i = revealTexts.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [revealTexts[i], revealTexts[j]] = [revealTexts[j], revealTexts[i]];
        }
        let revealIdx = 0;

        for (let c = 0; c < COLS; c++) {
          const colEl = document.createElement("div");
          colEl.className = "vault-col";

          for (let r = 0; r < ROWS; r++) {
            const rowEl = document.createElement("div");
            rowEl.className = "vault-row";
            rowEl.textContent = LINE_TEMPLATE;

            const isSecret = secretRowByCol.has(c) && secretRowByCol.get(c) === r;
            if (isSecret) {
              const entry = { el: rowEl, revealText: revealTexts[revealIdx++] ?? "", tickId: null, revealedByScan: false };
              secretEntries.push(entry);

              queueMicrotask(() => {
                rowEl.textContent = randomScrambleLine(LINE_TEMPLATE.length);
                entry.tickId = setInterval(() => {
                  if (entry.revealedByScan) return;
                  rowEl.textContent = randomScrambleLine(LINE_TEMPLATE.length);
                }, 55);
              });
            } else {
              queueMicrotask(() => {
                rowEl.textContent = randomScrambleLine(LINE_TEMPLATE.length);
                setInterval(() => {
                  rowEl.textContent = randomScrambleLine(LINE_TEMPLATE.length);
                }, 55);
              });
            }

            colEl.appendChild(rowEl);
          }

          vaultGridEl.appendChild(colEl);
        }
      }

      function loop() {
        updateScanOverlap();
        requestAnimationFrame(loop);
      }

      buildVault();
      requestAnimationFrame(loop);
      window.addEventListener("resize", () => updateScanOverlap());

      window.GEHENNA_WS?.on("scan:state", ({ state }) => {
        placeOutline(state);
        updateScanOverlap();
      });
    </script>
  </body>
</html>
