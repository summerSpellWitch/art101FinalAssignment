<!doctype html>
<html lang="en" data-page-id="3223">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deciphering Service</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .shield-action-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-top: 14px;
        margin-top: 4px;
        border-top: 1px solid rgba(134, 255, 154, 0.14);
      }

      .shield-btn {
        font: inherit;
        color: var(--fg);
        background: rgba(134, 255, 154, 0.08);
        border: 1px solid rgba(134, 255, 154, 0.4);
        border-radius: 8px;
        padding: 10px 18px;
        cursor: pointer;
        text-shadow: 0 0 10px var(--glow);
        box-shadow: 0 0 12px rgba(134, 255, 154, 0.12);
      }

      .shield-btn:hover {
        background: rgba(134, 255, 154, 0.14);
        border-color: rgba(134, 255, 154, 0.7);
        box-shadow: 0 0 18px rgba(134, 255, 154, 0.2);
      }

      .shield-btn.is-on {
        background: rgba(134, 255, 154, 0.16);
        border-color: rgba(134, 255, 154, 0.85);
        box-shadow: 0 0 20px rgba(134, 255, 154, 0.28);
      }
    </style>
  </head>
  <body>
    <main class="crt" aria-label="Deciphering Service">
      <div class="chrome">
        <div class="status">
          <span class="lamp" aria-hidden="true"></span>
          <span class="label">GEHENNAOS :: DECIPHERING SERVICE</span>
        </div>

        <section class="screen" aria-label="Deciphering Service screen">
          <div id="output" class="output" aria-live="polite"></div>
          <div class="shield-action-row">
            <button type="button" id="decipherToggleBtn" class="shield-btn" aria-pressed="false">
              Deciphering service: OFF — click to enable
            </button>
          </div>
        </section>
      </div>
    </main>

    <div id="scanOutlineGlobal" class="scanOutlineGlobal" aria-hidden="true"></div>

    <script src="./ws-client.js"></script>
    <script src="./access-guard.js"></script>
    <script>
      const outputEl = document.getElementById("output");
      const outlineEl = document.getElementById("scanOutlineGlobal");
      const toggleBtn = document.getElementById("decipherToggleBtn");

      function addLine(text, { dim = false } = {}) {
        const line = document.createElement("div");
        line.className = dim ? "line dim" : "line";
        line.textContent = text;
        outputEl.appendChild(line);
      }

      function setToggleUi(enabled) {
        toggleBtn.classList.toggle("is-on", enabled);
        toggleBtn.setAttribute("aria-pressed", enabled ? "true" : "false");
        toggleBtn.textContent = enabled
          ? "Deciphering service: ON — click to disable"
          : "Deciphering service: OFF — click to enable";
      }

      function placeOutline(state) {
        const enabled = Boolean(state?.enabled);
        outlineEl.classList.toggle("on", enabled);
        if (!enabled) return;

        const w = Math.round(state?.wPx ?? 300);
        const h = Math.round(state?.hPx ?? 200);
        const left = Math.round(((state.x ?? 0.5) * window.innerWidth) - w / 2);
        const top = Math.round(((state.y ?? 0.5) * window.innerHeight) - h / 2);
        outlineEl.style.left = `${left}px`;
        outlineEl.style.top = `${top}px`;
        outlineEl.style.width = `${w}px`;
        outlineEl.style.height = `${h}px`;
      }

      window.GEHENNA_WS?.on("ws:status", ({ connected }) => {
        addLine(connected ? "GEHENNA-NET link established." : "GEHENNA-NET link lost.", { dim: true });
      });

      window.GEHENNA_WS?.on("scan:state", ({ state }) => {
        placeOutline(state);
      });

      window.GEHENNA_WS?.on("decipher:state", ({ enabled }) => {
        setToggleUi(Boolean(enabled));
      });

      toggleBtn.addEventListener("click", () => {
        const next = toggleBtn.getAttribute("aria-pressed") !== "true";
        window.GEHENNA_WS?.send?.("decipher:set", { enabled: next });
      });

      addLine(
        "This service runs the calculations for the decipher command on all GehennaOS consoles. If for whatever reason service is offline, use the button to reenable the service.",
      );

      setToggleUi(false);
    </script>
  </body>
</html>
